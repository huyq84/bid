<!DOCTYPE html><html lang="zh-CN" style=""><head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>组织架构 - 到岗管理人员名单</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-layout">
    body {
      margin: 0;
      padding: 0;
      background-color: #f3f4f6;
    }
    .header-trapezoid {
      position: absolute;
      top: 23px;
      left: 0;
      width: 58px;
      height: 52px;
      background-color: #37a3eb;
      clip-path: polygon(0 0, 70% 0, 100% 100%, 0 100%);
    }
    .header-line {
      position: absolute;
      top: 75px;
      left: 72px;
      width: calc(100% - 72px);
      height: 3px;
      background-color: #37a3eb;
    }
    .sub-title-bg {
      position: absolute;
      top: 78.5px;
      left: 72px;
      width: 285px;
      height: 38px;
      background: linear-gradient(90deg, #ffd93d 0%, #ff4d4d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .label-gradient {
      background: linear-gradient(90deg, #ffb84d 0%, #ff4d4d 100%);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-900">
<!-- BEGIN: MainContainer -->
<main class="w-[1280px] h-[720px] bg-white relative overflow-hidden" style="background-image: url('../背景.png'); background-size: 100% 100%;">
<!-- BEGIN: TopHeader -->
<header class="relative w-full" data-purpose="page-header">
<div class="header-trapezoid"></div>
<div class="header-line"></div>
<div class="sub-title-bg"></div>
<div class="absolute top-5 left-[72px]">
<h1 class="text-3xl font-bold text-[#37a3eb]">一、组织架构</h1>
</div>
<div class="absolute top-[82px] left-[72px]">
<span class="text-white font-bold text-lg tracking-wider">到岗管理人员名单</span>
</div>
</header>
<!-- END: TopHeader -->
<!-- BEGIN: ContentContainer -->
<div class="absolute top-[118px] left-8 right-8 bottom-4 overflow-visible">
<div class="grid grid-cols-12 gap-8 h-full">
<!-- BEGIN: LeftSection_Table -->
<section class="col-span-7">

<div class="overflow-hidden border border-gray-300 rounded-lg shadow-md bg-white">
<table class="w-full text-xs text-center border-collapse">
<thead class="bg-gray-100 text-gray-700 font-bold border-b border-gray-300">
<tr>
<th class="py-1 border-r border-gray-300 w-12">序号</th>
<th class="py-1 border-r border-gray-300">职务</th>
<th class="py-1 border-r border-gray-300">姓名</th>
<th class="py-1 border-r border-gray-300">联系电话</th>
<th class="py-1">是否到岗</th>
</tr>
</thead>
<tbody class="divide-y divide-gray-200" data-bind-rows="roster">
<!-- 模板行: 1 个 tr 供 preview_data.js 克隆, 行数动态生成 -->
<tr class="hover:bg-blue-50" data-row-template="true">
  <td class="py-0.5 border-r border-gray-200 text-center" data-field="seq">1</td>
  <td class="py-0.5 border-r border-gray-200 text-left pl-2" data-field="role">项目经理</td>
  <td class="py-0.5 border-r border-gray-200 text-center" data-field="name">侯 帅</td>
  <td class="py-0.5 border-r border-gray-200 text-center" data-field="phone">13051103313</td>
  <td class="py-0.5 text-black font-medium text-center" data-field="present">已到岗</td>
</tr>
</tbody>
</table>
</div>
</section>
<!-- END: LeftSection_Table -->
<!-- BEGIN: RightSection_Image -->
<section class="col-span-5 flex flex-col items-center justify-start pt-2">
<div class="relative w-full max-w-lg">
<div class="overflow-hidden rounded-xl border-4 border-white shadow-2xl">
<img alt="办公场景照片" class="w-full h-auto object-cover" data-bind="s03_photo">
</div>
<div class="absolute -bottom-12 left-1/2 -translate-x-1/2 w-[80%]">
<div class="label-gradient text-white text-center py-3 px-8 rounded-lg shadow-xl font-bold text-xl tracking-widest border border-white/20" data-bind="s03_photo_caption">
            百瑞达工坊办公室
          </div>
</div>
</div>
</section>
<!-- END: RightSection_Image -->
</div>
</div>
<!-- END: ContentContainer -->
</main>
<!-- END: MainContainer -->
</body></html>
