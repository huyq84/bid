<!DOCTYPE html><html lang="zh-CN" style=""><head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>百草园城市更新项目 - 工作周报</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-fonts">
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }
  </style>
<style data-purpose="layout-styling">
    .main-container {
      width: 1280px;
      height: 720px;
      position: relative;
      overflow: hidden;
      background-color: #f5f7f9;
      background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.8) 0%, rgba(230,235,240,0.5) 100%);
      margin: 0 auto;
    }

    .bg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.4) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .content-wrapper {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-900">
<!-- BEGIN: PresentationPage -->
<main class="main-container bg-white" data-purpose="report-cover" style="background-image: url('../背景.png'); background-size: cover; background-position: center center; background-repeat: no-repeat;">

<div class="content-wrapper h-full">
<!-- BEGIN: TopBrandHeader -->
<header class="pt-8 px-12 shrink-0" data-purpose="header-brand">
<div class="flex items-center gap-4">
<h1 class="text-[#0081cc] text-2xl font-bold tracking-widest" data-bind="project.general_contractor">
            中建三局集团（深圳）有限公司
          </h1>
<div class="flex-grow h-4 bg-[#00adef] mt-1 ml-2"></div>
</div>
</header>
<!-- END: TopBrandHeader -->
<!-- BEGIN: CenterHeroSection -->
<section class="flex-grow flex items-center justify-center relative" data-purpose="title-section">
<div class="w-full bg-[#00adef] py-16 px-12 relative overflow-hidden flex flex-col items-center justify-center shadow-lg">
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
<div class="relative z-10 text-center">
<h2 class="text-white text-6xl font-bold tracking-[0.2em] mb-4 drop-shadow-md" data-bind="project.name">
              百草园城市更新项目
            </h2>
<h3 class="text-yellow-400 text-6xl font-bold tracking-[0.2em] drop-shadow-md" data-bind="cover.title">
              工作周报
            </h3>
</div>
<div class="absolute bottom-6 right-12 text-right z-10">
<p class="text-white text-xl font-bold mb-1"><span class="text-yellow-400">汇报单位：</span><span class="text-yellow-400" data-bind="project.subcontractor">北京清尚</span></p>
<p class="text-yellow-400 text-xl font-bold tracking-wider" data-bind="period.report_date_fmt">
              2026.05.18
            </p>
</div>
</div>
</section>
<!-- END: CenterHeroSection -->
<!-- BEGIN: FooterBranding -->
<footer class="pb-8 px-12 shrink-0" data-purpose="footer-brand">
<div class="flex items-end justify-between">
<div class="w-2/3 h-4 bg-[#00adef] mb-2"></div>
<div class="text-right">
<p class="text-[#005596] text-3xl font-black italic tracking-tighter" style="font-family: 'Kaiti', 'STKaiti', serif;">
              敢為天下先 永遠争第一
            </p>
</div>
</div>
</footer>
<!-- END: FooterBranding -->
</div>
</main>
<!-- END: PresentationPage -->
</body></html>
