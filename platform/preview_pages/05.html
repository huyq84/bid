<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Construction Project Weekly Report - Field Work</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Noto Sans SC', sans-serif;
        }
        .report-frame {
            width: 1280px;
            height: 720px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            background-image: url('../背景.png');
            background-size: cover;
            background-position: center;
        }
        .header-trapezoid {
            position: absolute;
            top: 23px;
            left: 0;
            width: 58px;
            height: 52px;
            background-color: #37a3eb;
            clip-path: polygon(0 0, 70% 0, 100% 100%, 0 100%);
            z-index: 20;
        }
        .header-line {
            position: absolute;
            top: 75px;
            left: 72px;
            width: calc(100% - 72px);
            height: 3px;
            background-color: #37a3eb;
            z-index: 10;
        }
        .sub-title-bg {
            position: absolute;
            top: 78.5px;
            left: 72px;
            width: 285px;
            height: 38px;
            background: linear-gradient(to right, #facc15, #f43f5e);
            z-index: 5;
        }
        .sub-title-text {
            position: absolute;
            top: 82px;
            left: 83px;
            font-size: 22px;
            font-weight: 700;
            color: white;
            letter-spacing: 1px;
            z-index: 15;
        }
        .photo-card {
            border: 1px solid #cccccc;
        }
    </style>
</head>
<body>
<div class="report-frame">
<div class="header-trapezoid"></div>
<div class="header-line"></div>
<header class="relative w-full pt-6 px-12">
<div class="absolute top-[21px] left-[72px] text-[36px] font-bold text-[#37a3eb]">二、上周工作</div>
<div class="sub-title-bg"></div>
<div class="sub-title-text">2.2 高管层现场工作</div>
</header>
<main class="absolute top-[120px] left-0 right-0 bottom-0 px-12 pb-6">
<div class="grid grid-cols-3 gap-4 h-full">
<div class="photo-card overflow-hidden">
<img class="w-full h-full object-cover"/>
</div>
<div class="photo-card overflow-hidden">
<img class="w-full h-full object-cover"/>
</div>
<div class="photo-card overflow-hidden">
<img class="w-full h-full object-cover"/>
</div>
<div class="photo-card overflow-hidden">
<img class="w-full h-full object-cover"/>
</div>
<div class="photo-card overflow-hidden">
<img class="w-full h-full object-cover"/>
</div>
<div class="photo-card overflow-hidden">
<img class="w-full h-full object-cover"/>
</div>
</div>
</main>
</div>
</body></html>
