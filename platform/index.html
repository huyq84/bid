<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>百草园周报填报平台</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js@10.2.0/public/assets/styles/choices.min.css">
  <script src="https://cdn.jsdelivr.net/npm/choices.js@10.2.0/public/assets/scripts/choices.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">

<!-- 顶部 Header -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-30">
  <div class="flex items-center h-14 px-4">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-md bg-blue-600 flex items-center justify-center text-white font-bold text-sm">百</div>
      <div>
        <div class="text-sm font-semibold leading-tight">百草园周报填报平台</div>
        <div class="text-xs text-slate-500 leading-tight">v5.2 · 静态原型 (Mock)</div>
      </div>
    </div>
    <div class="flex-1"></div>
    <div class="flex items-center gap-2 mr-4">
      <span class="text-xs text-slate-500">周期</span>
      <select id="period-select" class="text-sm border border-slate-300 rounded px-2 py-1 bg-white"></select>
    </div>
    <div class="flex items-center gap-2 mr-4">
      <span class="text-xs text-slate-500">项目</span>
      <select id="project-select" class="text-sm border border-slate-300 rounded px-2 py-1 bg-white">
        <option value="baicaoyuan">百草园城市更新项目</option>
      </select>
    </div>
    <div id="role-toggle" class="flex items-center gap-1 mr-4"></div>
    <div class="flex items-center gap-2">
      <button id="btn-rebuild-ai" class="text-sm px-3 py-1.5 rounded border border-blue-200 text-blue-700 hover:bg-blue-50">⚙ 重新生成</button>
      <button id="btn-preview" class="text-sm px-3 py-1.5 rounded bg-blue-600 text-white hover:bg-blue-700">👁 预览周报</button>
      <button id="btn-report-list" onclick="App.showReportList()" class="text-sm px-3 py-1.5 rounded border border-slate-300 text-slate-700 hover:bg-slate-50">📋 周报列表</button>
    </div>
  </div>
</header>

<!-- 主体 -->
<div class="flex h-[calc(100vh-3.5rem)] overflow-hidden">
  <!-- 左侧章节树 + 底部随手拍 (可拖拽调宽 / 折叠展开, 状态存 localStorage) -->
  <aside id="sidebar" class="border-r border-slate-200 bg-white flex flex-col relative" style="width: var(--sidebar-w, 256px); min-width: 0;">
    <div class="flex items-center p-3 border-b gap-2 shrink-0">
      <button id="sidebar-toggle" class="text-slate-400 hover:text-slate-700 text-sm font-mono w-5 h-5 flex items-center justify-center rounded hover:bg-slate-100" title="折叠/展开侧边栏">«</button>
      <div class="text-sm font-semibold text-slate-700 flex-1 sidebar-label">章节导航</div>
      <button onclick="App.addChapter()" class="text-xs text-blue-600 hover:underline sidebar-label">+ 新增章</button>
    </div>
    <div class="sidebar-content flex-1 flex flex-col min-h-0">
      <div class="p-2 border-b bg-slate-50 flex items-center gap-2 text-xs sidebar-label shrink-0">
        <span class="text-slate-500">显示:</span>
        <label class="flex items-center gap-1 cursor-pointer">
          <input type="checkbox" id="filter-chapter" checked onchange="App.applyNavFilter()">
          <span>章</span>
        </label>
        <label class="flex items-center gap-1 cursor-pointer">
          <input type="checkbox" id="filter-page" checked onchange="App.applyNavFilter()">
          <span>节点</span>
        </label>
        <label class="flex items-center gap-1 cursor-pointer">
          <input type="checkbox" id="filter-closing" onchange="App.applyNavFilter()">
          <span>封尾</span>
        </label>
      </div>
      <nav id="section-nav" class="flex-1 p-2 space-y-0.5 overflow-auto"></nav>
      <div class="border-t p-2 bg-slate-50 sidebar-label shrink-0">
        <button id="btn-capture" class="w-full text-sm px-3 py-2 rounded bg-emerald-600 text-white hover:bg-emerald-700 flex items-center justify-center gap-2">
          <span>📷</span> 随手拍
        </button>
        <div class="text-xs text-slate-500 mt-1 text-center">独立功能 · IndexedDB 离线</div>
      </div>
    </div>
    <!-- 右侧拖拽手柄: 5px 宽, 鼠标移上去变色, 折叠时也可拖展开 -->
    <div id="sidebar-resize-handle" title="拖拽调整侧边栏宽度"></div>
  </aside>

  <!-- 主区 -->
  <main class="flex-1 p-4 overflow-auto">
    <div id="anomaly-banner"></div>
    <div id="section-content"></div>
  </main>
</div>

<!-- Toast 容器 -->
<div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

<!-- Scripts -->
<script src="js/nav_tree.js"></script>
<script src="js/report_list.js"></script>
<script src="js/store.js"></script>
<script src="js/llm.js"></script>
<script src="js/rules.js"></script>
      <script src="js/sections/s01_cover.js"></script>
      <script src="js/sections/s02_toc.js"></script>
      <script src="js/sections/s03_roster.js"></script>
<script src="js/sections/s0301_milestones.js"></script>
<script src="js/sections/s04_work_done.js"></script>
<script src="js/sections/s05_photos.js"></script>
<script src="js/sections/s06_labor.js"></script>
<script src="js/sections/s07_ecc.js"></script>
<script src="js/sections/s08_design.js"></script>
<script src="js/sections/s09_plan.js"></script>
<script src="js/sections/s11_schedule.js"></script>
<script src="js/sections/s12_coord.js"></script>
<script src="js/sections/s14_closing.js"></script>
<script src="js/modules/capture.js"></script>
<script src="js/export_pdf.js"></script>
<script src="js/app.js"></script>
</body>
</html>
