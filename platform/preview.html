<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>百草园周报 - 预览</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif; background:#1a1a2e; }
  .frame-wrap { width: 1280px; height: 720px; margin: 24px auto; box-shadow: 0 8px 32px rgba(0,0,0,.45); border-radius: 8px; overflow: hidden; }
  .page-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: linear-gradient(135deg,#16213e,#0f3460); padding: 10px 20px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; box-shadow: 0 4px 16px rgba(0,0,0,.5); }
  .page-nav button { background: linear-gradient(135deg,#37a3eb,#2563eb); color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; }
  .page-nav button.active { background: linear-gradient(135deg,#f43f5e,#facc15); color:#1a1a2e; font-weight: bold; }
  .page-nav button:hover { transform: translateY(-1px); }
  .export-bar { margin-left: auto; display: flex; gap: 6px; }
  .export-bar button { background: #10b981; color:#fff; border: none; padding: 6px 14px; border-radius: 4px; font-size: 12px; cursor: pointer; }
  iframe { border: 0; width: 100%; height: 100%; display: block; background:#fff; }
  .spacer { height: 56px; }
  
  /* 进度动画遮罩 */
  .progress-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .progress-content {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 40px 60px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    min-width: 400px;
  }
  .progress-title {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 10px;
  }
  .progress-desc {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 30px;
  }
  .progress-spinner {
    width: 60px;
    height: 60px;
    border: 4px solid rgba(255, 255, 255, 0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .progress-bar-container {
    width: 100%;
    height: 8px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 15px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #facc15, #f43f5e);
    border-radius: 4px;
    transition: width 0.3s ease;
    box-shadow: 0 0 10px rgba(250, 204, 21, 0.5);
  }
  .progress-steps {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.8);
    margin-top: 10px;
  }
  
  /* 周期选择器样式 */
  #period-sel {
    background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    cursor: pointer;
    outline: none;
  }
  #period-sel:hover {
    background: linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0.15));
  }
  #period-sel option {
    background: #1a1a2e;
    color: #fff;
    border: none;
  }
</style>
</head>
<body>
<div class="page-nav" id="nav"></div>
<div class="spacer"></div>
<div class="frame-wrap" id="frame-wrap">
  <iframe id="page-frame" src="preview_pages/01.html"></iframe>
</div>

<script src="js/nav_tree.js?v=v1"></script>
<script src="js/store.js?v=v1"></script>
<script src="js/preview_data.js?v=v1"></script>
<script src="js/preview_print.js?v=v1"></script>
<script src="js/preview_export_server.js?v=v1"></script>
<script src="js/preview_export.js?v=v1"></script>
<script>
  const PAGES = [
    { id: "01",    title: "封面" },
    { id: "02",    title: "目录" },
    { id: "03",    title: "管理人员" },
    { id: "0301",  title: "重要节点" },
    { id: "04",    title: "工作完成" },
    { id: "05",    title: "工作现场" },
    { id: "06",    title: "人员统计" },
    { id: "07",    title: "ECC 销项" },
    { id: "08",    title: "图纸深化" },
    { id: "09",    title: "周计划" },
    { id: "10",    title: "施工段划分" },
    { id: "11",    title: "施工段计划" },
    { id: "12",    title: "协调事宜" }
  ];

  function showPage(id) {
    document.getElementById('page-frame').src = `preview_pages/${id}.html`;
    document.querySelectorAll('.page-nav button[data-id]').forEach(b => {
      b.classList.toggle('active', b.dataset.id === id);
    });
    // 同步数据绑定 (单页)
    if (window.PreviewData && typeof PreviewData.bindPage === 'function') {
      PreviewData.bindPage(document.getElementById('page-frame'), id, PreviewData.resolvePeriod());
    }
  }

  function buildNav() {
    const nav = document.getElementById('nav');
    const btns = PAGES.map(p =>
      `<button data-id="${p.id}" onclick="showPage('${p.id}')">${p.id} ${p.title}</button>`
    ).join("");
    const exports = `
      <div class="export-bar">
        <button onclick="PreviewExportServer.exportPDF()">📥 导出 PDF</button>
        <button onclick="exportWord()">📥 导出 Word</button>
        <button onclick="exportPPT()">📥 导出 PPT</button>
        <button onclick="PreviewPrint.printPDF()">🖨️ 打印</button>
      </div>`;
    nav.innerHTML = btns + exports;
    document.querySelector('.page-nav button[data-id]').classList.add('active');
  }
  function exportWord() { alert("📄 导出 Word: 待实现"); }
  function exportPPT() { alert("📊 导出 PPT: 待实现"); }

  buildNav();
  // v5.29: 顶部加周期选择器 + 启动数据绑定
  // 把 <select> 插入到 nav 末尾, export-bar 之前
  (function () {
    var navEl = document.getElementById('nav');
    if (!navEl) return;
    var sel = document.createElement('select');
    sel.id = 'period-sel';
    sel.className = 'ml-auto bg-white/20 text-white text-xs px-2 py-1 rounded border border-white/30 cursor-pointer';
    sel.title = '切换周报周期';
    navEl.appendChild(sel);
    if (window.PreviewData && typeof PreviewData.init === 'function') {
      PreviewData.init();
    }
  })();
</script>
</body>
</html>
